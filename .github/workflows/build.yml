name: Build Stremio Addon

on:
  schedule:
    - cron: "*/30 * * * *"   # every hour
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build static addon
        env:
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          CHANNEL_USERNAME:  ${{ secrets.CHANNEL_USERNAME }}
          OMDB_API_KEY:      ${{ secrets.OMDB_API_KEY }}
          PAGES_URL:         ${{ secrets.PAGES_URL }}
        run: node build.js

      - name: Commit rebuilt docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: rebuild addon [skip ci]"
          git push
